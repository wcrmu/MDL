runtime:
  device: cuda
  precision: bf16
  compile: false
  activation_checkpoint: true
  attention_backend: auto
  distributed: none
  nproc_per_node: null
  master_addr: 127.0.0.1
  master_port: 29500

data:
  train:
    # flat_parquet means the physical Parquet already has one row per sample.
    # For environment-specific raw layouts, use format: adapter_parquet and
    # provide adapter.callable, e.g. examples.parquet_identity_adapter:adapt.
    format: flat_parquet
    # adapter_parquet example:
    # adapter:
    #   callable: secure_pkg.mdl_adapters:flatten_requests
    #   input_columns: [request_id, user_id, candidates]
    #   options:
    #     candidate_field: candidates
    inputs:
      - /secure/train/day=*/part-*.parquet
    request_id: request_id
    group_id: request_id
    labels:
      click: click
    reader:
      engine: pyarrow_dataset
      columns_pruning: true
      num_workers: 8
      prefetch_batches: 4
      pin_memory: true
      shard_unit: row_group

  test:
    # Keep test/predict on the same format semantics as train so all commands
    # interpret a dataset through the same preprocessing boundary.
    format: flat_parquet
    inputs:
      - /secure/test/day=*/part-*.parquet
    request_id: request_id
    group_id: request_id
    reader:
      engine: pyarrow_dataset
      columns_pruning: true
      num_workers: 8
      prefetch_batches: 4
      pin_memory: true
      shard_unit: row_group
      batch_size_rows: 4096

  schema_policy:
    require_same_schema: true
    allow_missing_nullable_columns: false
    validate_before_train: true

features:
  - name: user_id
    kind: categorical
    source: user_id
    embedding_scope: feature
  - name: item_id
    kind: categorical
    source: item_id
    embedding_scope: feature
  # Dedicated MDL embeddings over the same raw IDs.
  - name: scenario_user_id
    kind: categorical
    source: user_id
    embedding_scope: scenario
  - name: scenario_item_id
    kind: categorical
    source: item_id
    embedding_scope: scenario
  - name: task_user_id
    kind: categorical
    source: user_id
    embedding_scope: task
  - name: task_item_id
    kind: categorical
    source: item_id
    embedding_scope: task
  - name: shop_id
    kind: categorical
    source: shop_id
    embedding_scope: feature
  - name: rankmixer_context_dense
    kind: dense
    source: rankmixer_context_dense
    dimension: 16
    embedding_scope: feature

sequences:
  - name: hist
    embedding_scope: feature
    max_length: 100
    truncation: tail
    encoder: longer
    rankmixer_summary_tokens: 2
    longer_token_merge: 4
    longer_inner_layers: 1
    time_delta_field: time_delta
    target_inputs:
      - item_id
    longer_query_tokens: 8
    longer_self_layers: 1
    fields:
      - name: item_id
        kind: categorical
        source: hist_item_id
      - name: shop_id
        kind: categorical
        source: hist_shop_id
      - name: action
        kind: categorical
        source: hist_action
      - name: age
        kind: dense
        source: hist_age
      - name: time_delta
        kind: dense
        source: hist_time_delta

scenarios:
  names:
    - default
  source: null

tokenization:
  # Semantic groups are projected independently before RankMixer.
  feature_tokenizer: groupwise
  feature_tokens:
    - name: user_profile
      inputs:
        - user_id
    - name: item_profile
      inputs:
        - item_id
        - shop_id
    - name: context
      inputs:
        - rankmixer_context_dense
    - name: long_history
      inputs:
        - hist
  sequence_tokens:
    - name: history
      inputs:
        - hist
  ns_tokens:
    - name: user
      inputs:
        - user_id
    - name: item
      inputs:
        - item_id
    - name: shop
      inputs:
        - shop_id
  scenario_tokens:
    - name: default
      important_inputs:
        - scenario_user_id
        - scenario_item_id
      prior_inputs:
        - hist
    - name: global
      important_inputs:
        - scenario_user_id
        - scenario_item_id
      prior_inputs:
        - hist
  task_tokens:
    - name: click
      important_inputs:
        - task_user_id
        - task_item_id
      prior_inputs:
        - hist

vocab_strategy:
  defaults:
    fit_split: train
    oov_id: 0
    padding_id: 0
    unseen_policy: oov
    artifact_dir: artifacts/vocab
  features:
    user_id:
      encoding: vocab
      source: user_id
      min_count: 5
      max_size: 5000000
      artifact: user_id.parquet
    item_id:
      encoding: vocab
      source: item_id
      min_count: 3
      max_size: 10000000
      artifact: item_id.parquet
    scenario_user_id:
      encoding: shared_vocab
      source: user_id
      share_with: user_id
      share_embedding: false
    scenario_item_id:
      encoding: shared_vocab
      source: item_id
      share_with: item_id
      share_embedding: false
    task_user_id:
      encoding: shared_vocab
      source: user_id
      share_with: user_id
      share_embedding: false
    task_item_id:
      encoding: shared_vocab
      source: item_id
      share_with: item_id
      share_embedding: false
    hist.item_id:
      encoding: shared_vocab
      source: hist_item_id
      share_with: item_id
      share_embedding: true
    shop_id:
      encoding: hash
      source: shop_id
      num_buckets: 1000000
      salt: mdl_v1_shop
    hist.shop_id:
      encoding: hash
      source: hist_shop_id
      num_buckets: 1000000
      salt: mdl_v1_hist_shop
    hist.action:
      encoding: hash
      source: hist_action
      num_buckets: 1024
      salt: mdl_v1_hist_action

model:
  name: mdl_rankmixer
  embedding_dim: 32
  token_dim: 32
  num_layers: 2
  num_heads: 4
  hidden_dim: 64
  init_std: 0.02
  ffn_activation: gelu
  task_head_hidden_dim: 64
  task_head_dropout: 0.0
  task_head_activation: gelu
  rankmixer_ffn_type: dense
  sparse_moe_regularization_initial: 1.0e-8
  sparse_moe_regularization_multiplier: 1.2
  sparse_moe_loss_weight: 1.0
  sequence_fusion: intent_ordered
  use_task_tokens: true
  use_scenario_tokens: true
  use_global_scenario_token: true
  use_task_feature_interaction: true
  use_scenario_feature_interaction: true
  use_request_cache: false

training:
  batch_size: 2048
  lr_dense: 0.005
  lr_schedule: cosine
  lr_warmup_steps: 1000
  lr_decay_steps: 100000
  lr_min_ratio: 0.1
  dense_optimizer: rmsprop
  rmsprop_alpha: 0.99999
  rmsprop_momentum: 0.0
  sparse_optimizer: adagrad
  adagrad_initial_accumulator_value: 0.1
  adagrad_eps: 1.0e-10
  embedding_sparse_gradients: true
  sparse_update_mode: ddp_synced_adagrad
  sparse_parameter_server_adapter: null
  dense_clip_norm: 90.0
  sparse_clip_norm: 120.0
  checkpoint_path: artifacts/checkpoints/mdl_rankmixer.pt
