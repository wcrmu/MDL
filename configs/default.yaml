project:
  name: mdl-recsys
  seed: 2026

dataset:
  data_dir: data/processed
  format: manifest_csv

model:
  name: mdl
  embedding_dim: 32
  token_dim: 36
  feature_backbone: rankmixer
  num_layers: 2
  num_heads: 4
  ffn_hidden_dim: 64
  dropout: 0.0
  ffn_type: dense
  sparse_moe_num_experts: 4
  sparse_moe_loss_weight: 0.0
  sparse_moe_use_dtsi: true
  sparse_moe_inference_threshold: 0.0

training:
  epochs: 1
  batch_size: 2048
  lr: 0.001
  device: cpu
  eval_max_batches: 100
  checkpoint_path: experiments/checkpoints/mdl.pt
