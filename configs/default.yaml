project:
  name: mdl
  seed: 1

dataset:
  data_dir: data/processed
  format: manifest_csv

model:
  name: mdl
  embedding_dim: 32
  token_dim: 36
  feature_backbone: rankmixer
  num_layers: 2
  num_heads: 4
  ffn_hidden_dim: 64
  task_head_type: linear
  task_head_hidden_dim: 64
  task_head_dropout: 0.0
  dropout: 0.0
  ffn_type: dense
  sparse_moe_num_experts: 4
  sparse_moe_loss_weight: 0.0
  sparse_moe_use_dtsi: true
  sparse_moe_dtsi_infer_weight: 0.5
  sparse_moe_inference_threshold: 0.0
  use_task_tokens: true
  use_scenario_tokens: true
  use_global_scenario_token: true
  use_task_feature_interaction: true
  use_scenario_feature_interaction: true

training:
  epochs: 1
  batch_size: 2048
  lr: 0.001
  sparse_lr: null
  lr_scheduler: none
  warmup_steps: 0
  min_lr_ratio: 0.0
  dense_weight_decay: 0.0
  gradient_clip_norm: null
  task_weights: null
  scenario_weights: null
  positive_class_weights: null
  auto_positive_class_weights: false
  validate_data: true
  validation_max_rows: 1000
  sparse_moe_target_active_ratio: null
  sparse_moe_loss_weight_update_rate: 0.05
  sparse_moe_loss_weight_min: 0.0
  sparse_moe_loss_weight_max: 1.0
  device: cpu
  eval_max_batches: 100
  checkpoint_path: experiments/checkpoints/mdl.pt
