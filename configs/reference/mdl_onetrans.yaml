# Experimental layerwise composition. No MDL or OneTrans paper defines this
# combined model; the explicit acknowledgement prevents accidental mislabeling.
extends: onetrans.yaml

# MDL domain tokens start from dedicated non-sequential embeddings. Historical
# context remains owned by the OneTrans S stream: it reaches domains through
# both S-to-NS propagation and the selected layers' masked direct S attention.
# Adding hist as a domain prior would therefore encode the same history twice.
tokenization:
  scenario_tokens:
    - name: default
      important_inputs: [scenario_user_id, scenario_item_id]
    - name: global
      important_inputs: [scenario_user_id, scenario_item_id]
  task_tokens:
    - name: click
      important_inputs: [task_user_id, task_item_id]

model:
  name: mdl_onetrans
  experimental_model_acknowledged: true
  sequence_fusion: intent_ordered
  ns_tokenizer: auto_split
  # This two-layer smoke profile reads S states at both layers. Larger profiles
  # can set this to num_layers - 2 to limit direct history reads to late layers.
  first_domain_sequence_layer: 0
