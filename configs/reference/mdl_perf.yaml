# 8-GPU MDL throughput profile.
extends: mdl_rankmixer_paper.yaml

runtime:
  device: cuda
  precision: bf16
  activation_checkpoint: none
  # Fixed perf-profile shapes let Inductor fuse the otherwise launch-bound
  # MDL graph. CUDA Graph capture further closes the remaining host launch
  # gaps. The generic and paper profiles remain eager for portability.
  compile: true
  compile_mode: reduce-overhead

data:
  train:
    reader:
      scanner_batch_rows: 1024
      max_prefetch_bytes: 536870912
      length_buckets:
        - {max_length: 128, batch_size: 4096}
        - {max_length: null, batch_size: 2048}
  test:
    reader:
      scanner_batch_rows: 1024
      max_prefetch_bytes: 536870912
      length_buckets:
        - {max_length: 128, batch_size: 4096}
        - {max_length: null, batch_size: 2048}

# Secure input columns already contain bounded integer bucket IDs. Every
# categorical field below declares its own exclusive bound.
vocab_strategy:
  features:
    user_id:
      encoding: identity
      num_buckets: 20000000
      min_count: null
      max_size: null
      artifact: null
      padding_id: 0
      out_of_range: error
    item_id:
      encoding: identity
      num_buckets: 50000000
      min_count: null
      max_size: null
      artifact: null
      padding_id: 0
      out_of_range: error
    scenario_user_id:
      encoding: identity
      num_buckets: 20000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error
    scenario_item_id:
      encoding: identity
      num_buckets: 50000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error
    task_user_id:
      encoding: identity
      num_buckets: 20000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error
    task_item_id:
      encoding: identity
      num_buckets: 50000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error

    shop_id:
      encoding: identity
      num_buckets: 10000000
      salt: null
      padding_id: 0
      out_of_range: error
    hist.item_id:
      encoding: identity
      num_buckets: 50000000
      share_with: item_id
      share_embedding: true
      padding_id: 0
      out_of_range: error

    hist.shop_id:
      encoding: identity
      num_buckets: 10000000
      salt: null
      padding_id: 0
      out_of_range: error
    hist.action:
      encoding: identity
      num_buckets: 4096
      salt: null
      padding_id: 0
      out_of_range: error
    scenario_single_column_history.item_id:
      encoding: identity
      num_buckets: 50000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error
    scenario_double_column_history.item_id:
      encoding: identity
      num_buckets: 50000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error
    scenario_inner_search_history.item_id:
      encoding: identity
      num_buckets: 50000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error
    task_click_history.item_id:
      encoding: identity
      num_buckets: 50000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error
    task_like_history.item_id:
      encoding: identity
      num_buckets: 50000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error
    task_favorite_history.item_id:
      encoding: identity
      num_buckets: 50000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error

training:
  batch_size: 4096
  embedding_distribution: sharded
  dense_distribution: ddp
  # The terminal scenario FFN is intentionally retained for equation-aligned
  # propagation, but its output is not consumed after the final block. Its
  # unused set is stable, so static DDP avoids rediscovering it every step.
  ddp:
    static_graph: true
    find_unused_parameters: false
    validated_static_graph: true
