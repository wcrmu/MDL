# 8-GPU OneTrans performance profile. Flash failure is fatal in benchmark mode.
extends: onetrans_paper.yaml

runtime:
  device: cuda
  precision: bf16
  attention_backend: flash
  activation_checkpoint: none
  # Inductor fuses the large projection/FFN elementwise graph around the
  # explicit varlen Flash kernels. Keep paper/default profiles eager.
  compile: true
  # The Parquet loader pads only to the longest row in each batch. Enforcing
  # that invariant avoids a dynamic slice and its per-step device-host sync.
  require_compact_sequence_batches: true

data:
  train:
    reader:
      scanner_batch_rows: 320
      max_prefetch_bytes: 536870912
      length_buckets:
        - {max_length: 128, batch_size: 2048}
        - {max_length: 256, batch_size: 1024}
        - {max_length: 512, batch_size: 512}
        - {max_length: 1024, batch_size: 384}
        - {max_length: 2048, batch_size: 320}
        - {max_length: null, batch_size: 128}
  test:
    reader:
      scanner_batch_rows: 320
      max_prefetch_bytes: 536870912
      length_buckets:
        - {max_length: 128, batch_size: 2048}
        - {max_length: 256, batch_size: 1024}
        - {max_length: 512, batch_size: 512}
        - {max_length: 1024, batch_size: 384}
        - {max_length: 2048, batch_size: 320}
        - {max_length: null, batch_size: 128}

vocab_strategy:
  features:
    user_id:
      encoding: identity
      num_buckets: 20000000
      min_count: null
      max_size: null
      artifact: null
      padding_id: 0
      out_of_range: error
    item_id:
      encoding: identity
      num_buckets: 50000000
      min_count: null
      max_size: null
      artifact: null
      padding_id: 0
      out_of_range: error
    scenario_user_id:
      encoding: identity
      num_buckets: 20000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error
    scenario_item_id:
      encoding: identity
      num_buckets: 50000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error
    task_user_id:
      encoding: identity
      num_buckets: 20000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error
    task_item_id:
      encoding: identity
      num_buckets: 50000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error

    shop_id:
      encoding: identity
      num_buckets: 10000000
      salt: null
      padding_id: 0
      out_of_range: error
    hist.item_id:
      encoding: identity
      num_buckets: 50000000
      share_with: item_id
      share_embedding: true
      padding_id: 0
      out_of_range: error

    hist.shop_id:
      encoding: identity
      num_buckets: 10000000
      salt: null
      padding_id: 0
      out_of_range: error
    hist.action:
      encoding: identity
      num_buckets: 4096
      salt: null
      padding_id: 0
      out_of_range: error

training:
  # Defaults to the validated 1190-token shape; shorter length buckets safely
  # raise the per-rank batch as high as 2048.
  batch_size: 320
  embedding_distribution: sharded
  dense_distribution: ddp
  # Representative 4-GPU audits across 256/512-row batches found stable use
  # of every dense parameter. Avoid reducer graph traversal on every step.
  ddp:
    static_graph: true
    find_unused_parameters: false
    validated_no_unused_parameters: true
    validated_static_graph: true
