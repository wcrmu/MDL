# Standalone 2×H100 production training config for mdl_onetrans.
# SDPA eager + Row-Wise Adagrad + Phase 2 shared_dim embedding profile.
# Physical embedding tables: 202; planned static embedding+state: 27.643 GiB/GPU.
# Fresh checkpoint path required (no remap from pre-Phase-2 weights).
runtime:
  device: cuda
  precision: bf16
  compile: false
  compile_mode: default
  require_compact_sequence_batches: false
  allow_tf32: true
  activation_checkpoint: none
  attention_backend: sdpa
  distributed: ddp
  nproc_per_node: 2
  master_addr: 127.0.0.1
  master_port: 29500
  trim_all_invalid_sequence_prefix: false
  validate_scenario_ids: false
data:
  train:
    format: adapter_parquet
    inputs: []
    request_id: search_id
    group_id: search_id
    labels:
      fst_cart: label_fst_cart
      upid_pay: upid_fst_trgt_noc_clk_pay_24h
      cateid_filter: cateid_is_fst_scene_sp_filter
    reader:
      engine: pyarrow_dataset
      columns_pruning: true
      num_workers: 8
      prefetch_batches: 8
      max_prefetch_bytes: 4294967296
      scanner_batch_rows: 64
      pin_memory: true
      shard_unit: row_group
      eager_schema_validation: sample
      schema_validation_samples: 64
      coalesce_pinned_tensors: true
      device_prefetch_batches: 2
      deduplicate_request_features: true
      validate_prehashed_nonzero: false
      trusted_input: true
      shuffle_buffer_rows: 8192
      shuffle_seed: 2025
      length_bucket_metric: sum
      length_buckets:
      - max_length: 1024
        batch_size: 72
      - max_length: 2048
        batch_size: 48
      - max_length: 4096
        batch_size: 32
      - max_length: 6144
        batch_size: 22
      - max_length: null
        batch_size: 16
    adapter:
      callable: src.dataloader:adapt_mdl_rankmixer_parquet
      input_columns:
      - currency_hn
      - hash_language_site_hn
      - language_hn
      - page_elsn_hn
