vocab_strategy:
  defaults:
    fit_split: train
    oov_id: 0
    padding_id: 0
    unseen_policy: oov
    artifact_dir: artifacts/vocab
  features: {}
model:
  name: mdl_onetrans
  embedding_dim: 32
  token_dim: 256
  num_layers: 6
  num_heads: 4
  hidden_dim: 1024
  init_std: 0.02
  ffn_activation: gelu
  task_head_hidden_dim: 1024
  task_head_dropout: 0.0
  task_head_activation: gelu
  sequence_fusion: intent_ordered
  ns_tokenizer: auto_split
  num_ns_tokens: 32
  max_position_embeddings: 2088
  use_sep_tokens: true
  use_pyramid: true
  pyramid_round_to: 32
  final_s_tokens: 12
  use_task_tokens: true
  use_scenario_tokens: true
  use_global_scenario_token: true
  use_task_feature_interaction: true
  use_scenario_feature_interaction: true
  mdl_feature_interaction: direct_ffn
  use_request_cache: true
  first_domain_sequence_layer: 4
  experimental_model_acknowledged: true
training:
  batch_size: 16
  embedding_distribution: sharded
  dense_distribution: ddp
  embedding_sharding:
    strategy: auto
    local_dedup: true
    table_wise_max_rows: 65536
  ddp:
    static_graph: true
    find_unused_parameters: false
    gradient_as_bucket_view: true
    bucket_cap_mb: 50
    audit_steps: 10
    validated_no_unused_parameters: true
    validated_static_graph: true
  lr_dense: 0.001
  lr_sparse: 0.001
  lr_schedule: constant
  lr_warmup_steps: 500
  lr_decay_steps: null
  lr_min_ratio: 0.0
  dense_optimizer: rmsprop
  fused_dense_optimizer: true
  rmsprop_alpha: 0.99999
  rmsprop_momentum: 0.0
  sparse_optimizer: rowwise_adagrad
  adagrad_initial_accumulator_value: 0.1
  adagrad_eps: 1.0e-10
  embedding_sparse_gradients: true
  embedding_weight_dtype: bf16
  sparse_update_mode: ddp_synced_adagrad
  sparse_parameter_server_adapter: null
  dense_clip_norm: 1.0
  sparse_clip_norm: 1.0
  loss_reduction: mean_per_task
  quick_eval:
    enabled: true
    every_steps: 1000
    max_batches: 20
    split: train
    auc_bins: 4096
  save_checkpoint: false
  checkpoint_path: artifacts/checkpoints/mdl_onetrans_2xh100_phase2_shared_dim
  embedding_collect_stats: false
  embedding_validate_indices: false
