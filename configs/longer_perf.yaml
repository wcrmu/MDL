# 8-GPU LONGER performance profile preserving mixed global/recent visibility.
extends: longer_paper.yaml

runtime:
  device: cuda
  precision: bf16
  attention_backend: flash
  activation_checkpoint: selective

data:
  train:
    reader:
      scanner_batch_rows: 256
      max_prefetch_bytes: 536870912
      length_buckets:
        - {max_length: 128, batch_size: 1024}
        - {max_length: 256, batch_size: 512}
        - {max_length: 512, batch_size: 256}
        - {max_length: 1024, batch_size: 128}
        - {max_length: 2048, batch_size: 64}
        - {max_length: null, batch_size: 32}
  test:
    reader:
      scanner_batch_rows: 256
      max_prefetch_bytes: 536870912
      length_buckets:
        - {max_length: 128, batch_size: 1024}
        - {max_length: 256, batch_size: 512}
        - {max_length: 512, batch_size: 256}
        - {max_length: 1024, batch_size: 128}
        - {max_length: 2048, batch_size: 64}
        - {max_length: null, batch_size: 32}

vocab_strategy:
  features:
    user_id:
      encoding: identity
      num_buckets: 20000000
      min_count: null
      max_size: null
      artifact: null
      padding_id: 0
      out_of_range: error
    item_id:
      encoding: identity
      num_buckets: 50000000
      min_count: null
      max_size: null
      artifact: null
      padding_id: 0
      out_of_range: error
    scenario_user_id:
      encoding: identity
      num_buckets: 20000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error
    scenario_item_id:
      encoding: identity
      num_buckets: 50000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error
    task_user_id:
      encoding: identity
      num_buckets: 20000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error
    task_item_id:
      encoding: identity
      num_buckets: 50000000
      share_with: null
      share_embedding: false
      padding_id: 0
      out_of_range: error

    shop_id:
      encoding: identity
      num_buckets: 10000000
      salt: null
      padding_id: 0
      out_of_range: error
    hist.item_id:
      encoding: identity
      num_buckets: 50000000
      share_with: item_id
      share_embedding: true
      padding_id: 0
      out_of_range: error

    hist.shop_id:
      encoding: identity
      num_buckets: 10000000
      salt: null
      padding_id: 0
      out_of_range: error
    hist.action:
      encoding: identity
      num_buckets: 4096
      salt: null
      padding_id: 0
      out_of_range: error

training:
  batch_size: 64
  embedding_distribution: sharded
  dense_distribution: ddp
