# 2×H100 overlay: sharded BF16 embeddings with Row-Wise Adagrad.
# Keeps base RankMixer buckets/dims unchanged. attention_backend=sdpa
# because the deployment torch build lacks torch.nn.attention.varlen.
extends: mdl_rankmixer.yaml

runtime:
  distributed: ddp
  nproc_per_node: 2
  attention_backend: sdpa

training:
  embedding_distribution: sharded
  embedding_weight_dtype: bf16
  sparse_optimizer: rowwise_adagrad
  lr_sparse: 0.001
  adagrad_initial_accumulator_value: 0.1
  adagrad_eps: 1.0e-10
  checkpoint_path: artifacts/checkpoints/mdl_rankmixer_2xh100_rowwise
