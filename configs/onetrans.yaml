# Architecture smoke profile. The shared fixture has no cross-sequence
# timestamps, so it explicitly selects the paper's intent-ordered variant.
extends: default.yaml

sequences:
  - name: hist
    embedding_scope: feature
    max_length: 100
    truncation: tail
    sequence_order: oldest_to_newest
    # OneTrans projects every raw event into an S-token and owns all sequence
    # modeling; no LONGER/pooled summary is built before the unified backbone.
    encoder: raw
    fields:
      - name: item_id
        kind: categorical
        source: hist_item_id
      - name: shop_id
        kind: categorical
        source: hist_shop_id
      - name: action
        kind: categorical
        source: hist_action
      - name: age
        kind: dense
        source: hist_age
      - name: time_delta
        kind: dense
        source: hist_time_delta

model:
  name: onetrans
  sequence_fusion: intent_ordered
  ns_tokenizer: auto_split
  # Learned absolute Pos Emb over 100 S tokens + 4 inferred NS tokens.
  max_position_embeddings: 104
